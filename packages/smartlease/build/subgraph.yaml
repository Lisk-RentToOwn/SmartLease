specVersion: 0.0.4
description: SmartLease Platform Subgraph
repository: https://github.com/Lisk-RentToOwn/RentToOwn
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: IdentityRegistry
    network: lisk-sepolia-testnet
    source:
      address: "0x46527214308F17de4925Ce0A95d3631d6E15D163"
      abi: IdentityRegistry
      startBlock: 22208138
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RoleAssignment
      abis:
        - name: IdentityRegistry
          file: IdentityRegistry/IdentityRegistry.json
      eventHandlers:
        - event: RoleAssigned(indexed address,uint8)
          handler: handleRoleAssigned
      file: IdentityRegistry/IdentityRegistry.wasm
  - kind: ethereum/contract
    name: PropertyToken
    network: lisk-sepolia-testnet
    source:
      address: "0xDA938829b13B8287028C3541aBccb54b3c71cBB3"
      abi: PropertyToken
      startBlock: 22208588
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PropertyTokenMint
        - PropertyTokenTransfer
      abis:
        - name: PropertyToken
          file: PropertyToken/PropertyToken.json
      eventHandlers:
        - event: PropertyTokenMinted(indexed uint256,indexed address,uint256,string)
          handler: handlePropertyMinted
        - event: PropertyTokenTransferred(indexed uint256,indexed address,indexed address,uint256)
          handler: handlePropertyTransferred
      file: IdentityRegistry/IdentityRegistry.wasm
  - kind: ethereum/contract
    name: RentToOwn
    network: lisk-sepolia-testnet
    source:
      address: "0x9253CA8FB6B5e1e5DA5791c0327859d5503707B8"
      abi: RentToOwn
      startBlock: 22208588
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PropertyCreated
        - RentPaidEvent
        - EquityUpdated
        - PropertyOccupied
        - LandlordWithdrawal
        - TokensTransferred
      abis:
        - name: RentToOwn
          file: RentToOwn/RentToOwn.json
      eventHandlers:
        - event: PropertyCreated(indexed uint256,indexed
            address,uint256,uint256,uint256,string,string,string,string,string,string,string)
          handler: handlePropertyCreated
        - event: RentPaid(indexed uint256,indexed address,uint256)
          handler: handleRentPaid
        - event: EquityUpdated(indexed uint256,indexed address,uint256)
          handler: handleEquityUpdated
        - event: PropertyOccupied(indexed uint256,indexed address)
          handler: handlePropertyOccupied
        - event: LandlordWithdrawal(indexed address,indexed uint256,uint256)
          handler: handleLandlordWithdrawal
        - event: TokensTransferred(indexed uint256,indexed address,indexed address,uint256,uint256)
          handler: handleTokensTransferred
      file: IdentityRegistry/IdentityRegistry.wasm
